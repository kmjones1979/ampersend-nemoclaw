# ampersend OpenShell Integration Policy
# ============================================================
# Drop this file into your OpenShell sandbox to allow agents
# to make x402 payments via ampersend at runtime while keeping
# all other egress locked down.
#
# Apply:  openshell policy set --sandbox <name> --file ampersend-openshell-policy.yaml
# Verify: openshell policy get --sandbox <name>
# ============================================================

version: 1

# ── Filesystem ──────────────────────────────────────────────
# Static — locked at sandbox creation time.
# Agents read/write only their working dir and /tmp.
filesystem_policy:
  include_workdir: true
  read_only:
    - /app
    - /usr
    - /lib
    - /lib64
    - /proc
    - /dev/urandom
    - /etc
    - /bin
    - /sbin
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

# ── Landlock LSM ────────────────────────────────────────────
landlock:
  compatibility: best_effort

# ── Process identity ────────────────────────────────────────
process:
  run_as_user: sandbox
  run_as_group: sandbox

# ── Network policies ────────────────────────────────────────
# Dynamic — hot-reloadable without restarting the sandbox.
# Each entry: which binaries may reach which endpoints.
network_policies:

  # ── ampersend API ───────────────────────────────────────
  # Agents authenticate, set up smart accounts, and make
  # x402 payments via the ampersend API.
  ampersend_api:
    name: ampersend-api
    endpoints:
      - host: api.ampersend.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: POST
              path: /api/**
          - allow:
              method: GET
              path: /api/**
          - allow:
              method: PUT
              path: /api/**
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/node
      - path: /usr/bin/npx
      - path: /sandbox/.vscode-server/**
      - path: /sandbox/.local/bin/**

  # ── ampersend Staging API (optional) ────────────────────
  # For development/testing against the staging environment.
  ampersend_staging_api:
    name: ampersend-staging-api
    endpoints:
      - host: api.staging.ampersend.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/node
      - path: /usr/bin/npx
      - path: /sandbox/.vscode-server/**
      - path: /sandbox/.local/bin/**

  # ── x402 payment endpoints (general) ────────────────────
  # Agents may need to reach arbitrary x402-enabled servers
  # to make payments. Add specific hosts here as needed.
  # For broad access, use audit mode first to discover hosts.
  x402_endpoints:
    name: x402-payment-endpoints
    endpoints:
      - host: httpay.xyz
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/bin/node
      - path: /usr/bin/npx
      - path: /sandbox/.local/bin/**

  # ── Base blockchain RPC ─────────────────────────────────
  # Smart account wallets need RPC access to Base (mainnet
  # and Sepolia testnet) for transaction signing and
  # on-chain verification.
  base_rpc:
    name: base-blockchain-rpc
    endpoints:
      - host: mainnet.base.org
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-write
      - host: sepolia.base.org
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/node
      - path: /usr/bin/npx
      - path: /sandbox/.local/bin/**

  # ── NVIDIA inference (default NemoClaw profile) ──────────
  # Keep NVIDIA Cloud API access scoped to model inference only.
  nvidia_inference:
    name: nvidia-cloud-inference
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-write
      - host: build.nvidia.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-write
    binaries:
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/node
      - path: /sandbox/.local/bin/**

  # ── npm registry (package installs inside sandbox) ───────
  npm_registry:
    name: npm-registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
    binaries:
      - path: /usr/bin/npm
      - path: /usr/bin/npx
      - path: /usr/bin/node

  # ── GitHub (read-only; remove if not needed) ─────────────
  github_readonly:
    name: github-read-only
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**/info/refs*
          - allow:
              method: POST
              path: /**/git-upload-pack
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/openclaw
      - path: /usr/bin/git
      - path: /usr/bin/gh

# ── Usage notes ─────────────────────────────────────────────
#
# Minimal setup (payments only, no staging):
#   Remove ampersend_staging_api block.
#
# Audit-only mode (log violations, don't block):
#   Change enforcement: enforce → enforcement: audit on any block.
#
# Rotate network policy without restarting:
#   openshell policy set --sandbox <name> --file this-file.yaml
#
# Pair with NemoClaw blueprint:
#   nemoclaw setup --policy ampersend-openshell-policy.yaml
